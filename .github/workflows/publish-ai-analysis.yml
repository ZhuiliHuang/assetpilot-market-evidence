name: Publish AI analysis

on:
  workflow_run:
    workflows: ["Candidate received"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: market-evidence-publication
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'chatgpt-inbox'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out trusted validator from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: trusted
          persist-credentials: false
      - name: Check out candidate commit only as data
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: candidate-source
          persist-credentials: false
          fetch-depth: 2
      - name: Check out Actions-managed data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install only trusted validation code
        run: python -m pip install -e "trusted[dev]"
      - name: Validate candidate and stage a complete public tree
        run: >-
          python trusted/scripts/validate_ai_candidate.py
          --candidate-repository candidate-source
          --head-sha "${{ github.event.workflow_run.head_sha }}"
          --public-root data/public
          --output "$RUNNER_TEMP/published-public"
      - name: Publish validated analysis only
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data/public
          cp -R "$RUNNER_TEMP/published-public" data/public
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git diff --cached --quiet && exit 0
          git commit -m "analysis: publish validated ChatGPT review"
          git push origin data

  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'chatgpt-inbox'
    needs: publish
    uses: ./.github/workflows/deploy-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
