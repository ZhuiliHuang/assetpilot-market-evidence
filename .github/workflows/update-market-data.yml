name: Update market data

on:
  schedule:
    # 20:30 Asia/Shanghai, Monday through Friday (UTC+8, no DST).
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Build deterministic fixtures or probe approved live public sources"
        required: true
        default: fixture
        type: choice
        options:
          - fixture
          - live
      publish:
        description: "Publish the validated tree to the data branch"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: market-evidence-publication
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted workflow code
        uses: actions/checkout@v4
      - name: Check out the last validated data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: previous-data
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run repository and calculation tests
        run: python -m pytest -q
      - name: Seed the last validated public tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/public"
          cp -R previous-data/public/. "$RUNNER_TEMP/public/"
      - name: Recover the latest validated historical analysis when its reference is missing
        shell: bash
        run: |
          set -euo pipefail
          recovery_commit=""
          while read -r candidate_commit; do
            if git -C previous-data cat-file -e "$candidate_commit:public/market-analysis-latest.json" 2>/dev/null; then
              recovery_commit="$candidate_commit"
              break
            fi
          done < <(git -C previous-data log --format=%H -- public/market-analysis-latest.json)
          if [[ -z "$recovery_commit" ]]; then
            echo "No historical validated analysis is available"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/historical-data"
          git -C previous-data archive "$recovery_commit" public \
            | tar -xf - -C "$RUNNER_TEMP/historical-data"
          python scripts/recover_stale_analysis.py \
            --current-root "$RUNNER_TEMP/public" \
            --historical-root "$RUNNER_TEMP/historical-data/public"
      - name: Build validated evidence in an isolated directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" == "fixture" ]]; then
            python scripts/update_market_data.py --fixtures --output "$RUNNER_TEMP/public"
          else
            python scripts/update_market_data.py --output "$RUNNER_TEMP/public"
          fi
      - name: Upload validated public tree
        uses: actions/upload-artifact@v4
        with:
          name: validated-market-evidence
          path: ${{ runner.temp }}/public
          if-no-files-found: error
          retention-days: 3

  publish:
    if: ${{ github.event_name == 'schedule' || inputs.publish }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out trusted workflow code
        uses: actions/checkout@v4
      - name: Download validated public tree
        uses: actions/download-artifact@v4
        with:
          name: validated-market-evidence
          path: ${{ runner.temp }}/public
      - name: Publish only the validated public directory
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --branch data --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RUNNER_TEMP/data-branch"
          rm -rf "$RUNNER_TEMP/data-branch/public"
          cp -R "$RUNNER_TEMP/public" "$RUNNER_TEMP/data-branch/public"
          cd "$RUNNER_TEMP/data-branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git diff --cached --quiet && exit 0
          git commit -m "data: publish validated market evidence"
          git push origin data

  deploy:
    if: ${{ github.event_name == 'schedule' || inputs.publish }}
    needs: publish
    uses: ./.github/workflows/deploy-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
